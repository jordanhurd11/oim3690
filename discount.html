<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .checkout-container {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    @media (max-width: 768px) {
      .checkout-container {
        grid-template-columns: 1fr;
      }
    }
    h1 {
      grid-column: 1 / -1;
      color: white;
      text-align: center;
      margin-bottom: 20px;
    }
    .cart-section, .summary-section {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    h2 {
      color: #333;
      font-size: 18px;
      margin-bottom: 20px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }
    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 15px;
      align-items: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .item-details {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }
    .item-price {
      color: #667eea;
      font-weight: bold;
    }
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .quantity-control button {
      width: 30px;
      height: 30px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }
    .quantity-control button:hover {
      background: #f0f0f0;
    }
    .remove-btn {
      background: #ff4444;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .remove-btn:hover {
      background: #cc0000;
    }
    .summary-section {
      display: flex;
      flex-direction: column;
    }
    .summary-line {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }
    .summary-line.total {
      border: none;
      padding: 16px 0;
      font-size: 20px;
      font-weight: bold;
      color: #667eea;
    }
    .summary-line label {
      color: #555;
      font-weight: 500;
    }
    .summary-line .amount {
      color: #333;
      font-weight: 600;
    }
    .summary-line.discount .amount {
      color: #27ae60;
      font-weight: bold;
    }
    .summary-line.tax .amount {
      color: #e74c3c;
    }
    .membership-section {
      background: #f0f4ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }
    .membership-section input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .membership-section label {
      margin-left: 10px;
      color: #333;
      font-weight: 600;
      cursor: pointer;
    }
    .checkout-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: auto;
      width: 100%;
      transition: transform 0.2s;
    }
    .checkout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .empty-cart {
      text-align: center;
      padding: 30px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>🛒 Checkout</h1>
  
  <div class="checkout-container">
    <div class="cart-section">
      <h2>Order Summary</h2>
      <div id="cartItems">
        <div class="empty-cart">Your cart is empty</div>
      </div>
    </div>

    <div class="summary-section">
      <h2>Order Total</h2>
      
      <div class="membership-section">
        <input type="checkbox" id="isMember">
        <label for="isMember">Member Discount (10% off)</label>
      </div>

      <div class="summary-line">
        <label>Subtotal</label>
        <span class="amount" id="subtotal">$0.00</span>
      </div>

      <div class="summary-line discount">
        <label>Member Discount</label>
        <span class="amount" id="discountAmount">-$0.00</span>
      </div>

      <div class="summary-line tax">
        <label>Tax (8%)</label>
        <span class="amount" id="taxAmount">$0.00</span>
      </div>

      <div class="summary-line total">
        <label>Total</label>
        <span id="finalTotal">$0.00</span>
      </div>

      <button class="checkout-btn" onclick="completeCheckout()">Complete Purchase</button>
    </div>
  </div>

  <script>
    const TAX_RATE = 0.08;
    let cart = [
      { id: 1, name: "Wireless Headphones", price: 79.99, quantity: 1 },
      { id: 2, name: "USB-C Cable", price: 12.99, quantity: 2 },
      { id: 3, name: "Phone Case", price: 24.99, quantity: 1 }
    ];

    function getDiscount(total, isMember) {
      if (isMember) {
        return total * 0.1;
      } else {
        return 0;
      }
    }

    function renderCart() {
      const cartContainer = document.getElementById("cartItems");
      
      if (cart.length === 0) {
        cartContainer.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
        return;
      }

      cartContainer.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="item-details">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-price">$${item.price.toFixed(2)}</div>
            </div>
          </div>
          <div class="quantity-control">
            <button onclick="updateQuantity(${item.id}, -1)">−</button>
            <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
            <button onclick="updateQuantity(${item.id}, 1)">+</button>
            <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function updateQuantity(id, change) {
      const item = cart.find(i => i.id === id);
      if (item) {
        item.quantity += change;
        if (item.quantity < 1) {
          removeItem(id);
        } else {
          renderCart();
          updateSummary();
        }
      }
    }

    function removeItem(id) {
      cart = cart.filter(item => item.id !== id);
      renderCart();
      updateSummary();
    }

    function updateSummary() {
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const isMember = document.getElementById("isMember").checked;
      const discount = getDiscount(subtotal, isMember);
      const afterDiscount = subtotal - discount;
      const tax = afterDiscount * TAX_RATE;
      const total = afterDiscount + tax;

      document.getElementById("subtotal").textContent = "$" + subtotal.toFixed(2);
      document.getElementById("discountAmount").textContent = "-$" + discount.toFixed(2);
      document.getElementById("taxAmount").textContent = "$" + tax.toFixed(2);
      document.getElementById("finalTotal").textContent = "$" + total.toFixed(2);
    }

    function completeCheckout() {
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }
      alert("Thank you for your purchase!");
    }

    document.getElementById("isMember").addEventListener("change", updateSummary);

    // Initial render
    renderCart();
    updateSummary();
  </script>
</body>
</html>
