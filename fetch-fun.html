<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetch Fun</title>
</head>
<body>

  <h1>Random Dog</h1>
  <img id="dog-image" src="" alt="A random dog" width="400">
  <p id="error-message"></p>
  <button onclick="loadDog()">Load Dog</button>

  <script>
    async function loadDog() {
      try {
        const res = await fetch("https://dog.ceo/api/breeds/image/random");
        const data = await res.json();
        document.getElementById("dog-image").src = data.message;
      } catch (err) {
        document.getElementById("error-message").textContent = "Something went wrong. Try again.";
      }
    }

    loadDog();
  </script>

</body>
</html>
