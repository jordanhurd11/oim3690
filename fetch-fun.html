<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetch Fun</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .container {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 30px;
    }

    .content {
      text-align: center;
      margin-bottom: 30px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #dog-image {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    #joke-container {
      display: none;
      background: #f5f5f5;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    #joke-setup {
      font-size: 1.1em;
      color: #333;
      margin-bottom: 15px;
      font-weight: bold;
    }

    #joke-punchline {
      font-size: 1.2em;
      color: #667eea;
      font-style: italic;
      font-weight: bold;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }

    .btn-primary {
      background-color: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background-color: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background-color: #f5f5f5;
      color: #333;
      border: 2px solid #667eea;
    }

    .btn-secondary:hover {
      background-color: #667eea;
      color: white;
      transform: translateY(-2px);
    }

    .btn-surprise {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .btn-surprise:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
    }

    #error-message {
      color: #e74c3c;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #loading {
      display: none;
      color: #667eea;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 Fetch Fun</h1>
    
    <div id="loading">Loading...</div>
    <div id="error-message"></div>

    <div class="content">
      <img id="dog-image" src="" alt="A random dog" style="display: none;">
      <div id="joke-container">
        <div id="joke-setup"></div>
        <div id="joke-punchline"></div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn-primary" onclick="loadDog()">🐕 Load Dog</button>
      <button class="btn-primary" onclick="loadJoke()">😂 Load Joke</button>
      <button class="btn-surprise" onclick="surpriseMe()">🎲 Surprise Me!</button>
    </div>
  </div>

  <script>
    function hideLoading() {
      document.getElementById("loading").style.display = "none";
    }

    function showLoading() {
      document.getElementById("loading").style.display = "block";
    }

    function clearError() {
      document.getElementById("error-message").textContent = "";
    }

    function showError(message) {
      document.getElementById("error-message").textContent = message;
    }

    async function loadDog() {
      showLoading();
      clearError();
      document.getElementById("dog-image").style.display = "none";
      document.getElementById("joke-container").style.display = "none";

      try {
        const res = await fetch("https://dog.ceo/api/breeds/image/random");
        const data = await res.json();
        document.getElementById("dog-image").src = data.message;
        document.getElementById("dog-image").style.display = "block";
      } catch (err) {
        showError("Something went wrong. Try again.");
      } finally {
        hideLoading();
      }
    }

    async function loadJoke() {
      showLoading();
      clearError();
      document.getElementById("dog-image").style.display = "none";
      document.getElementById("joke-container").style.display = "none";

      try {
        const res = await fetch("https://official-joke-api.appspot.com/random_joke");
        const data = await res.json();
        document.getElementById("joke-setup").textContent = data.setup;
        document.getElementById("joke-punchline").textContent = data.punchline;
        document.getElementById("joke-container").style.display = "block";
      } catch (err) {
        showError("Failed to load joke. Try again.");
      } finally {
        hideLoading();
      }
    }

    function surpriseMe() {
      const random = Math.random();
      if (random < 0.5) {
        loadDog();
      } else {
        loadJoke();
      }
    }

    loadDog();
  </script>

</body>
</html>
