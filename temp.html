<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 40px auto;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px 16px;
            text-align: left;
        }
        th {
            background-color: #1f2937;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        caption {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <caption>Sample Workout Log</caption>
        <thead>
            <tr>
                <th>Exercise</th>
                <th>Sets</th>
                <th>Reps</th>
                <th>Weight</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Bench Press</td>
                <td>4</td>
                <td>8</td>
                <td>185 lbs</td>
            </tr>
            <tr>
                <td>Squat</td>
                <td>4</td>
                <td>6</td>
                <td>225 lbs</td>
            </tr>
            <tr>
                <td>Deadlift</td>
                <td>3</td>
                <td>5</td>
                <td>275 lbs</td>
            </tr>
            <tr>
                <td>Overhead Press</td>
                <td>3</td>
                <td>10</td>
                <td>95 lbs</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
