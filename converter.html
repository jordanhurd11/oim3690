<div class="converter-container">
  <h2>Temperature Converter</h2>
  <form>
    <label for="celsius">Temperature (°C):</label>
    <input type="number" id="celsius" name="celsius" placeholder="Enter temperature" step="0.01">
    
    <label for="fahrenheit">Temperature (°F):</label>
    <input type="number" id="fahrenheit" name="fahrenheit" placeholder="Enter temperature" step="0.01">
    
    <button type="reset">Clear</button>
  </form>
</div>

<script>
  const celsiusInput = document.getElementById("celsius");
  const fahrenheitInput = document.getElementById("fahrenheit");

  celsiusInput.addEventListener("input", function() {
    if (this.value === "") {
      fahrenheitInput.value = "";
    } else {
      const c = Number(this.value);
      const f = (c * 9/5) + 32;
      fahrenheitInput.value = f.toFixed(2);
    }
  });

  fahrenheitInput.addEventListener("input", function() {
    if (this.value === "") {
      celsiusInput.value = "";
    } else {
      const f = Number(this.value);
      const c = (f - 32) * 5/9;
      celsiusInput.value = c.toFixed(2);
    }
  });
</script>
