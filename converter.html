<div class="converter-container">
  <h2>Celsius to Fahrenheit Converter</h2>
  <form>
    <label for="celsius">Temperature (°C):</label>
    <input type="number" id="celsius" name="celsius" placeholder="Enter temperature" step="0.01" required>
    
    <label for="fahrenheit">Temperature (°F):</label>
    <input type="number" id="fahrenheit" name="fahrenheit" placeholder="Result" readonly>
    
    <button type="submit">Convert</button>
  </form>
</div>

<script>
  function convert() {
    const celsius = Number(document.getElementById("celsius").value);
    const fahrenheit = (celsius * 9/5) + 32;
    document.getElementById("fahrenheit").value = fahrenheit.toFixed(2);
  }

  document.querySelector("form").addEventListener("submit", function(event) {
    event.preventDefault();
    convert();
  });
</script>
