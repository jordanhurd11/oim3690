<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Playlist</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 2.5em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    .search-box:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 20px;
      background-color: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #764ba2;
    }

    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .add-form input, .add-form textarea {
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 0.95em;
      font-family: inherit;
    }

    .add-form input {
      flex: 1;
      min-width: 150px;
    }

    .add-form textarea {
      flex: 1;
      min-width: 150px;
      resize: vertical;
      height: 50px;
    }

    .playlist {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .song-card {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 1px solid #ddd;
    }

    .song-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .album-art {
      width: 100%;
      height: 200px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3em;
      font-weight: bold;
      overflow: hidden;
      position: relative;
    }

    .album-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .album-art-placeholder {
      font-size: 3.5em;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
    }

    .song-info {
      margin-bottom: 15px;
    }

    .song-title {
      font-size: 1.2em;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
      word-break: break-word;
    }

    .song-artist {
      color: #666;
      font-size: 0.95em;
      margin-bottom: 3px;
    }

    .song-album {
      color: #888;
      font-size: 0.9em;
      font-style: italic;
    }

    .song-duration {
      color: #999;
      font-size: 0.85em;
      margin-top: 5px;
    }

    .song-actions {
      display: flex;
      gap: 8px;
      margin-top: 15px;
    }

    .song-actions button {
      flex: 1;
      padding: 8px 12px;
      font-size: 0.9em;
    }

    .play-btn {
      background-color: #667eea;
    }

    .play-btn:hover {
      background-color: #5568d3;
    }

    .delete-btn {
      background-color: #e74c3c;
      flex: 0.6;
    }

    .delete-btn:hover {
      background-color: #c0392b;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-size: 1.1em;
    }

    .empty-state-icon {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .song-count {
      text-align: center;
      color: #667eea;
      font-size: 0.9em;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 My Playlist</h1>

    <div class="controls">
      <input 
        type="text" 
        id="searchBox" 
        class="search-box" 
        placeholder="Search songs, artists, or albums..."
      >
      <button onclick="clearFilter()">Clear Filter</button>
    </div>

    <div class="add-form">
      <input 
        type="text" 
        id="songTitle" 
        placeholder="Song Title"
        maxlength="50"
      >
      <input 
        type="text" 
        id="songArtist" 
        placeholder="Artist Name"
        maxlength="50"
      >
      <input 
        type="text" 
        id="songAlbum" 
        placeholder="Album Name"
        maxlength="50"
      >
      <input 
        type="text" 
        id="songDuration" 
        placeholder="Duration (e.g., 3:45)"
        maxlength="10"
      >
      <input 
        type="text" 
        id="songImage" 
        placeholder="Image URL (optional)"
        maxlength="200"
      >
      <button onclick="addSong()">Add Song</button>
    </div>

    <div id="playlist" class="playlist"></div>
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-state-icon">🎧</div>
      <p>No songs found. Start building your playlist!</p>
    </div>
    <div class="song-count">Total: <span id="songCount">0</span> songs</div>
  </div>

  <script>
    let songs = [
      {
        title: "Blinding Lights",
        artist: "The Weeknd",
        album: "After Hours",
        duration: "3:20",
        image: ""
      },
      {
        title: "As It Was",
        artist: "Harry Styles",
        album: "Harry's House",
        duration: "2:53",
        image: ""
      },
      {
        title: "Shape of You",
        artist: "Ed Sheeran",
        album: "÷ (Divide)",
        duration: "3:54",
        image: ""
      },
      {
        title: "Someone You Loved",
        artist: "Lewis Capaldi",
        album: "Divinely Uninspired",
        duration: "3:02",
        image: ""
      }
    ];

    function getColorGradient(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      
      const colors = [
        ['#667eea', '#764ba2'],
        ['#f093fb', '#f5576c'],
        ['#4facfe', '#00f2fe'],
        ['#43e97b', '#38f9d7'],
        ['#fa709a', '#fee140'],
        ['#30cfd0', '#330867'],
        ['#a8edea', '#fed6e3'],
        ['#ff9a56', '#ff6a88'],
      ];
      
      return colors[Math.abs(hash) % colors.length];
    }

    function getInitials(text) {
      return text
        .split(' ')
        .map(word => word[0])
        .join('')
        .toUpperCase()
        .slice(0, 2);
    }

    function renderPlaylist(songsToRender = songs) {
      const playlistDiv = document.getElementById("playlist");
      const emptyState = document.getElementById("emptyState");
      
      playlistDiv.innerHTML = "";

      if (songsToRender.length === 0) {
        emptyState.style.display = "block";
        document.getElementById("songCount").textContent = "0";
        return;
      }

      emptyState.style.display = "none";
      document.getElementById("songCount").textContent = songsToRender.length;

      songsToRender.forEach((song, index) => {
        const card = document.createElement("div");
        card.className = "song-card";
        
        let albumArtHTML;
        if (song.image) {
          albumArtHTML = `<img src="${song.image}" alt="${song.title}" onerror="this.parentElement.innerHTML='<div class=\\'album-art-placeholder\\'>${getInitials(song.artist)}</div>'">`;
        } else {
          const gradient = getColorGradient(song.artist);
          const initials = getInitials(song.artist);
          albumArtHTML = `<div class='album-art-placeholder' style='background: linear-gradient(135deg, ${gradient[0]} 0%, ${gradient[1]} 100%);'>${initials}</div>`;
        }

        card.innerHTML = `
          <div class="album-art">
            ${albumArtHTML}
          </div>
          <div class="song-info">
            <div class="song-title">${escapHTML(song.title)}</div>
            <div class="song-artist">by ${escapHTML(song.artist)}</div>
            <div class="song-album">Album: ${escapHTML(song.album)}</div>
            <div class="song-duration">⏱️ ${escapHTML(song.duration)}</div>
          </div>
          <div class="song-actions">
            <button class="play-btn" onclick="playSong('${escapHTML(song.title)}')">▶️ Play</button>
            <button class="delete-btn" onclick="deleteSong(${index})">🗑️ Delete</button>
          </div>
        `;

        playlistDiv.appendChild(card);
      });
    }

    function escapHTML(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function addSong() {
      const title = document.getElementById("songTitle").value.trim();
      const artist = document.getElementById("songArtist").value.trim();
      const album = document.getElementById("songAlbum").value.trim();
      const duration = document.getElementById("songDuration").value.trim();
      const image = document.getElementById("songImage").value.trim();

      if (!title || !artist || !album) {
        alert("Please fill in Title, Artist, and Album at minimum.");
        return;
      }

      songs.push({
        title: title,
        artist: artist,
        album: album,
        duration: duration || "0:00",
        image: image || ""
      });

      document.getElementById("songTitle").value = "";
      document.getElementById("songArtist").value = "";
      document.getElementById("songAlbum").value = "";
      document.getElementById("songDuration").value = "";
      document.getElementById("songImage").value = "";
      document.getElementById("searchBox").value = "";

      renderPlaylist();
    }

    function deleteSong(index) {
      if (confirm("Are you sure you want to delete this song?")) {
        songs.splice(index, 1);
        renderPlaylist();
      }
    }

    function playSong(title) {
      alert(`Now playing: ${title} 🎵`);
    }

    function searchSongs() {
      const query = document.getElementById("searchBox").value.toLowerCase();
      
      if (!query) {
        renderPlaylist();
        return;
      }

      const filtered = songs.filter(song => 
        song.title.toLowerCase().includes(query) ||
        song.artist.toLowerCase().includes(query) ||
        song.album.toLowerCase().includes(query)
      );

      renderPlaylist(filtered);
    }

    function clearFilter() {
      document.getElementById("searchBox").value = "";
      renderPlaylist();
    }

    document.getElementById("searchBox").addEventListener("input", searchSongs);

    renderPlaylist();
  </script>

</body>
</html>
