<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="notification" id="notification"></div>
    
    <div class="container">
        <h1>📝 My To-Do List</h1>
        
        <div class="subject-management">
            <input 
                type="text" 
                id="subjectInput" 
                placeholder="Create new subject..."
                autocomplete="off"
            >
            <button id="addSubjectBtn">Add Subject</button>
        </div>

        <div class="subject-tabs" id="subjectTabs"></div>

        <div class="input-container">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new task..."
                autocomplete="off"
            >
            <input 
                type="date" 
                id="dueDateInput"
            >
            <button id="addBtn">Add</button>
        </div>

        <ul class="todo-list" id="todoList"></ul>

        <div class="empty-state" id="emptyState">
            No tasks yet. Add one to get started! 🚀
        </div>

        <div class="stats">
            <span>Tasks: <strong id="totalCount">0</strong></span>
            <span>Completed: <strong id="completedCount">0</strong></span>
            <button class="clear-completed-btn" id="clearBtn" disabled>Clear Completed</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
